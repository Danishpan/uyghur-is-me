<!DOCTYPE html>
<html lang="ug">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Вордли · Уйғур тили</title>
  <!-- Fonts + shared theme (variables, reset, body, header, back button, toasts, modal) -->
  <link rel="stylesheet" href="shared/theme.css" />
  <style>
    /* ── Wordle-specific variables ─────────────────────── */
    :root {
      --tile: 58px;
      --gap:  5px;
    }

    /* ── Board ─────────────────────────────────────────── */
    #board-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 0 8px;
    }
    #board {
      display: grid;
      grid-template-rows: repeat(6, var(--tile));
      grid-template-columns: repeat(5, var(--tile));
      gap: var(--gap);
    }

    /* ── Tiles ─────────────────────────────────────────── */
    .tile {
      width: var(--tile);
      height: var(--tile);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.85rem;
      font-weight: 800;
      user-select: none;
      text-transform: uppercase;
      transition: border-color 0.05s;
    }
    .tile[data-letter] { border-color: #565758; }

    /* Tile states (set after flip) */
    .tile[data-state="correct"] { background: var(--green);  border-color: var(--green);  color: #fff; }
    .tile[data-state="present"] { background: var(--yellow); border-color: var(--yellow); color: #fff; }
    .tile[data-state="absent"]  { background: var(--gray);   border-color: var(--gray);   color: #fff; }

    /* ── Tile animations ───────────────────────────────── */
    .tile.pop {
      animation: pop 80ms ease-in-out;
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.13); }
      100% { transform: scale(1); }
    }

    .tile.shake { animation: shake 500ms ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15%,45%,75% { transform: translateX(-5px); }
      30%,60%,90% { transform: translateX(5px); }
    }

    .tile.flip { animation: flip 500ms ease; }
    @keyframes flip {
      0%   { transform: scaleY(1); }
      50%  { transform: scaleY(0.01); }
      100% { transform: scaleY(1); }
    }

    .tile.bounce { animation: bounce 600ms ease; }
    @keyframes bounce {
      0%,20%  { transform: translateY(0); }
      40%     { transform: translateY(-22px); }
      55%     { transform: translateY(4px); }
      70%     { transform: translateY(-10px); }
      85%     { transform: translateY(2px); }
      100%    { transform: translateY(0); }
    }

    /* ── Keyboard ──────────────────────────────────────── */
    #keyboard {
      width: 100%;
      max-width: 500px;
      padding: 4px 4px 16px;
    }
    .kb-row {
      display: flex;
      justify-content: center;
      gap: clamp(2px, 0.7vw, 5px);
      margin-bottom: clamp(3px, 0.8vw, 6px);
    }
    .key {
      height: clamp(42px, 12.5vw, 56px);
      min-width: 0;
      flex: 1;
      max-width: 44px;
      padding: 0;
      border-radius: 4px;
      border: none;
      background: var(--key-bg);
      color: var(--text);
      font-size: clamp(0.6rem, 2.5vw, 0.78rem);
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, color 0.2s;
      touch-action: manipulation;
    }
    .key.wide {
      flex: 1.7;
      max-width: 72px;
      font-size: clamp(0.52rem, 1.9vw, 0.7rem);
      letter-spacing: 0.02em;
    }
    .key:active { filter: brightness(0.85); }

    .key[data-state="correct"] { background: var(--green);  color: #fff; }
    .key[data-state="present"] { background: var(--yellow); color: #fff; }
    .key[data-state="absent"]  { background: #3a3a3c;       color: #888; }

    /* ── Responsive tweaks (wordle-specific) ──────────── */
    @media (max-height: 680px) {
      :root { --tile: 48px; }
      .key { height: 40px; }
      #board-wrap { padding: 10px 0 4px; }
      #keyboard { padding-bottom: 8px; }
    }
    @media (max-width: 380px) {
      :root { --tile: clamp(44px, 13vw, 52px); }
    }
  </style>
</head>
<body>

<div id="toasts"></div>

<header>
  <a href="index.html" class="btn-back">← Оюнлар</a>
  <h1>Вордли</h1>
  <p class="subtitle">5 ҺӘРП · 6 УРИНИШ</p>
</header>

<div id="board-wrap">
  <div id="board"></div>
</div>

<div id="keyboard"></div>

<div id="overlay">
  <div class="modal">
    <div class="modal-title" id="m-title"></div>
    <div class="modal-word"  id="m-word"></div>
    <div class="modal-meaning" id="m-meaning" style="font-style:italic"></div>
    <div class="modal-stats">
      <div class="stat"><span class="stat-n" id="s-played">0</span><span class="stat-l">Барлиқ оюн</span></div>
      <div class="stat"><span class="stat-n" id="s-wins">0</span><span class="stat-l">Утуш</span></div>
      <div class="stat"><span class="stat-n" id="s-streak">0</span><span class="stat-l">Кетма-кет</span></div>
    </div>
    <button class="btn-primary" id="btn-new">Йеңи оюн ▶</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  WORD LIST
//  5-letter Uyghur words in Cyrillic script.
//  Format: ['WORD', 'meaning in Russian/Kazakh context']
//  ⚠️  PROTOTYPE — please verify with a native Uyghur speaker
//      before public release and expand to a full dictionary.
// ═══════════════════════════════════════════════════════
const WORDS = [
  ['КИТАП', 'book'],
  ['АРМАН', 'dream / aspiration'],
  ['ШАМАЛ', 'wind'],
  ['БУЛУТ', 'cloud'],
  ['ТАВУҚ', 'chicken'],
  ['ТУМАН', 'fog / mist'],
  ['ТАМАҚ', 'food / throat'],
  ['ЙИЛАН', 'snake'],
  ['БЕЛИҚ', 'fish'],
  ['ТОҒАЙ', 'grove / thicket'],
  ['ШӘҺӘР', 'city'],
  ['ЖАНАР', 'flame'],
  ['САНАМ', 'beloved / idol'],
  ['ЧАМАН', 'garden / meadow'],
  ['НУРЛУ', 'radiant / bright'],
  ['БОЛУР', 'crystal'],
  ['НИЛУФ', 'lotus'],
  ['ГҮЛҮМ', 'my flower'],
  ['ДАРЬЯ', 'river'],
  ['САДАФ', 'mother of pearl'],
  ['КЕМЕР', 'belt'],
  ['ЖУМАҚ', 'fist'],
  ['НӘРСЕ', 'thing / something'],
  ['ТОҒАМ', 'paternal uncle'],
  ['ЙОЛУМ', 'my road'],
];

// Valid guess set — same as answer words for now.
// TODO: replace with a full Uyghur Cyrillic dictionary.
const VALID = new Set(WORDS.map(w => w[0]));

// ═══════════════════════════════════════════════════════
//  KEYBOARD LAYOUT
// ═══════════════════════════════════════════════════════
const KB = [
  ['Й','Ц','У','Ү','К','Қ','Е','Н','Ң','Г','Ғ'],
  ['Ш','А','Ә','В','П','Р','О','Ө','Л','Д','Ж'],
  ['Ф','Я','Ч','С','М','И','Т','Б','Ю','Э','Ы'],
  ['Х','Ь','Ъ','Щ','З','Ё','Ю','Ь','Х','Һ'],
  ['ENTER','⌫'],
];

// ═══════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════
const ROWS = 6, COLS = 5;
const FLIP_MS = 500, FLIP_STAGGER = 320;

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let target, meaning, row, col, guess, over;
let stats = JSON.parse(localStorage.getItem('wy-stats') || '{"played":0,"wins":0,"streak":0}');

const tiles   = [];    // tiles[r][c] = DOM element
const keyEls  = {};    // keyEls['А'] = button element

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function init() {
  const pick    = WORDS[Math.floor(Math.random() * WORDS.length)];
  target        = pick[0];
  meaning       = pick[1];
  row = col     = 0;
  guess         = [];
  over          = false;

  buildBoard();
  buildKeyboard();
  document.addEventListener('keydown', onKey);
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  tiles.length = 0;
  for (let r = 0; r < ROWS; r++) {
    tiles[r] = [];
    for (let c = 0; c < COLS; c++) {
      const t = document.createElement('div');
      t.className = 'tile';
      board.appendChild(t);
      tiles[r][c] = t;
    }
  }
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  Object.keys(keyEls).forEach(k => delete keyEls[k]);

  // Use only 3 content rows + function row for cleaner look
  const rows = [
    ['Й','Ц','У','Ү','К','Қ','Е','Н','Ң','Г','Ғ'],
    ['Ш','А','Ә','В','П','Р','О','Ө','Л','Д','Ж','Х'],
    ['Ф','Я','Ч','С','М','И','Т','Б','Ю','Э','Ы','Ь','Һ','З'],
    ['ENTER', '⌫'],
  ];

  rows.forEach(rowKeys => {
    const div = document.createElement('div');
    div.className = 'kb-row';
    rowKeys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k === 'ENTER' || k === '⌫' ? ' wide' : '');
      btn.textContent = k === 'ENTER' ? 'КИРИШ' : k;
      btn.dataset.key = k;
      btn.addEventListener('pointerdown', e => { e.preventDefault(); handleKey(k); });
      div.appendChild(btn);
      if (k !== 'ENTER' && k !== '⌫') keyEls[k] = btn;
    });
    kb.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
function onKey(e) {
  if (over) return;
  if (e.key === 'Enter')     { handleKey('ENTER'); return; }
  if (e.key === 'Backspace') { handleKey('⌫');    return; }
  const ch = e.key.toUpperCase();
  if (isCyrillic(ch))        { handleKey(ch); }
}

// Match any single Cyrillic character (standard + Uyghur extensions)
function isCyrillic(ch) {
  return ch.length === 1 && /[Ѐ-ӿҰұ]/u.test(ch);
}

function handleKey(k) {
  if (over) return;
  if (k === '⌫')    { deleteLetter(); }
  else if (k === 'ENTER') { submitGuess(); }
  else               { addLetter(k); }
}

function addLetter(ch) {
  if (col >= COLS) return;
  const t = tiles[row][col];
  t.textContent   = ch;
  t.dataset.letter = ch;
  animOnce(t, 'pop');
  guess.push(ch);
  col++;
}

function deleteLetter() {
  if (col <= 0) return;
  col--;
  guess.pop();
  const t = tiles[row][col];
  t.textContent = '';
  delete t.dataset.letter;
}

// ═══════════════════════════════════════════════════════
//  SUBMIT
// ═══════════════════════════════════════════════════════
function submitGuess() {
  if (col < COLS) {
    toast('5 һәрп болуши керек');
    shakeRow(row);
    return;
  }
  const word = guess.join('');

  // Soft dictionary check — only warn, don't block (prototype UX)
  // In production: uncomment the block below for strict validation
  // if (!VALID.has(word)) {
  //   toast('Бундақ сөз йоқ');
  //   shakeRow(row);
  //   return;
  // }

  const result = evaluate(word);
  revealRow(row, word, result);

  const won = result.every(r => r === 'correct');
  const currentRow = row;

  setTimeout(() => {
    updateKeyColors(word, result);
    if (won) {
      bounceRow(currentRow);
      endGame(true, currentRow + 1);
    } else if (currentRow + 1 >= ROWS) {
      endGame(false, ROWS);
    }
  }, COLS * FLIP_STAGGER + FLIP_MS + 50);

  row++;
  col   = 0;
  guess = [];
}

// ═══════════════════════════════════════════════════════
//  EVALUATION  (handles duplicate letters correctly)
// ═══════════════════════════════════════════════════════
function evaluate(word) {
  const result  = Array(COLS).fill('absent');
  const tArr    = target.split('');
  const gArr    = word.split('');

  // Pass 1: correct positions
  for (let i = 0; i < COLS; i++) {
    if (gArr[i] === tArr[i]) {
      result[i] = 'correct';
      tArr[i]   = null;
      gArr[i]   = null;
    }
  }
  // Pass 2: present (wrong position)
  for (let i = 0; i < COLS; i++) {
    if (gArr[i] === null) continue;
    const idx = tArr.indexOf(gArr[i]);
    if (idx !== -1) {
      result[i]  = 'present';
      tArr[idx]  = null;
    }
  }
  return result;
}

// ═══════════════════════════════════════════════════════
//  ANIMATIONS
// ═══════════════════════════════════════════════════════
function revealRow(r, word, result) {
  for (let c = 0; c < COLS; c++) {
    const t     = tiles[r][c];
    const state = result[c];
    const delay = c * FLIP_STAGGER;
    setTimeout(() => {
      t.classList.add('flip');
      // Change colour at the invisible midpoint
      setTimeout(() => {
        t.dataset.state = state;
      }, FLIP_MS / 2);
      t.addEventListener('animationend', () => t.classList.remove('flip'), { once: true });
    }, delay);
  }
}

function shakeRow(r) {
  for (let c = 0; c < COLS; c++) animOnce(tiles[r][c], 'shake');
}

function bounceRow(r) {
  for (let c = 0; c < COLS; c++) {
    setTimeout(() => animOnce(tiles[r][c], 'bounce'), c * 80);
  }
}

function animOnce(el, cls) {
  el.classList.remove(cls);
  void el.offsetWidth; // reflow
  el.classList.add(cls);
  el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
}

// ═══════════════════════════════════════════════════════
//  KEYBOARD COLOUR TRACKING
// ═══════════════════════════════════════════════════════
const PRIORITY = { correct: 3, present: 2, absent: 1 };

function updateKeyColors(word, result) {
  for (let i = 0; i < COLS; i++) {
    const ch  = word[i];
    const st  = result[i];
    const btn = keyEls[ch];
    if (!btn) continue;
    const cur = btn.dataset.state;
    if (!cur || PRIORITY[st] > PRIORITY[cur]) btn.dataset.state = st;
  }
}

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
function toast(msg, ms = 2200) {
  const el = document.createElement('div');
  el.className   = 'toast';
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ═══════════════════════════════════════════════════════
//  END GAME
// ═══════════════════════════════════════════════════════
const WIN_MSGS = [
  'Аҗайип! 🎉', 'Зор! 🌟', 'Яхши! 👏',
  'Тоғра! ✅', 'Камаль! 💪', 'Болиду! 😊',
];

function endGame(won, usedRows) {
  over = true;
  document.removeEventListener('keydown', onKey);

  // Update stats
  stats.played++;
  if (won) { stats.wins++; stats.streak++; }
  else     { stats.streak = 0; }
  localStorage.setItem('wy-stats', JSON.stringify(stats));

  document.getElementById('s-played').textContent = stats.played;
  document.getElementById('s-wins').textContent   = stats.wins;
  document.getElementById('s-streak').textContent = stats.streak;

  document.getElementById('m-title').textContent   = won ? WIN_MSGS[Math.min(usedRows - 1, WIN_MSGS.length - 1)] : 'Болмиди 😔';
  document.getElementById('m-word').textContent    = target;
  document.getElementById('m-meaning').textContent = meaning;

  setTimeout(() => document.getElementById('overlay').classList.add('open'), 1600);
}

// ═══════════════════════════════════════════════════════
//  NEW GAME
// ═══════════════════════════════════════════════════════
document.getElementById('btn-new').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('open');
  document.removeEventListener('keydown', onKey);
  init();
});

// ── Start ──
init();
</script>
</body>
</html>
